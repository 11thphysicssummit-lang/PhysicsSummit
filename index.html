<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11th Physics Summit</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND IMAGE DARI UPLOAD */
.bg{
  position:fixed;
  inset:0;
  background: url("bg.png") center/cover no-repeat;
  filter: saturate(1.2);
  transform: scale(1.02);
}

/* DARK OVERLAY BIAR TEXT KELIHATAN */
.overlay{
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, rgba(255,0,122,0.25), rgba(0,0,0,0.35));
}

/* TEXT CENTER */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:2;
}

/* TITLE */
h1{
  font-size: clamp(40px,6vw,90px);
  font-weight:900;
  color:#ff2d95;
  text-shadow:
    0 10px 30px rgba(255,0,122,0.35),
    0 0 40px rgba(255,0,122,0.25);
}

/* SUBTITLE */
h2{
  margin-top:10px;
  font-size: clamp(16px,2vw,26px);
  font-weight:500;
  color:white;
  opacity:0.9;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:12px 28px;
  border:none;
  border-radius:999px;
  background: linear-gradient(135deg,#ff007a,#ff4da6);
  color:white;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(255,0,122,0.3);
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 35px rgba(255,0,122,0.4);
}

/* FLOATING EFFECT LIGHT */
.glow{
  position:absolute;
  width:300px;
  height:300px;
  background:#ff4da6;
  filter:blur(120px);
  opacity:0.25;
  border-radius:50%;
  top:10%;
  left:10%;
  animation: float 8s ease-in-out infinite;
}

.glow2{
  position:absolute;
  width:300px;
  height:300px;
  background:#7c4dff;
  filter:blur(120px);
  opacity:0.2;
  border-radius:50%;
  bottom:10%;
  right:10%;
  animation: float 10s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="glow"></div>
<div class="glow2"></div>

<div class="hero">
  <h1>11th Physics Summit</h1>
  <h2>Departemen Fisika ITS</h2>
  <button class="btn">Explore Event</button>
</div>

</body>
</html>
