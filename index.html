<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Animated BG</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;

  /* base clean pink-white */
  background: linear-gradient(135deg,#fff0f6,#ffe4f1,#fff7fb);
}

/* BIG PINK ANIMATED GLOW */
.bg{
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 30% 30%, rgba(255, 0, 122, 0.35), transparent 45%),
              radial-gradient(circle at 70% 40%, rgba(255, 77, 166, 0.25), transparent 50%),
              radial-gradient(circle at 50% 80%, rgba(255, 0, 180, 0.18), transparent 55%);
  animation: softMove 10s ease-in-out infinite;
}

@keyframes softMove{
  0%,100%{transform:scale(1) translate(0,0);}
  50%{transform:scale(1.08) translate(10px,-10px);}
}

/* FLOATING PINK BUBBLES */
.blob{
  position:absolute;
  border-radius:50%;
  filter: blur(80px);
  opacity:0.6;
  animation: float 9s ease-in-out infinite;
}

/* DOMINAN PINK */
.blob1{
  width:340px;
  height:340px;
  background:#ff007a;
  top:10%;
  left:10%;
}

.blob2{
  width:300px;
  height:300px;
  background:#ff4da6;
  top:20%;
  right:10%;
  animation-delay:2s;
}

.blob3{
  width:260px;
  height:260px;
  background:#ff66b3;
  bottom:10%;
  left:30%;
  animation-delay:4s;
}

.blob4{
  width:220px;
  height:220px;
  background:#ffb3d9;
  bottom:20%;
  right:20%;
  animation-delay:6s;
}

@keyframes float{
  0%,100%{
    transform:translateY(0) translateX(0) scale(1);
  }
  50%{
    transform:translateY(-35px) translateX(15px) scale(1.07);
  }
}

/* SOFT GRID (VERY LIGHT) */
.grid{
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,0,122,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,122,0.06) 1px, transparent 1px);
  background-size:80px 80px;
  opacity:0.12;
  animation: gridMove 18s linear infinite;
}

@keyframes gridMove{
  from{transform:translateY(0);}
  to{transform:translateY(-90px);}
}

/* LIGHT PULSE GLOW */
.pulse{
  position:absolute;
  width:120%;
  height:120%;
  background: radial-gradient(circle at center, rgba(255,0,122,0.18), transparent 60%);
  animation: pulseAnim 6s ease-in-out infinite;
}

@keyframes pulseAnim{
  0%,100%{transform:scale(1); opacity:0.35;}
  50%{transform:scale(1.15); opacity:0.65;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="pulse"></div>
<div class="grid"></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="blob blob4"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Summit</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#fff0f6,#ffe4f1,#fff7fb);
}

/* BACKGROUND PINK ANIMATION */
.bg{
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 30% 30%, rgba(255,0,122,0.25), transparent 45%),
              radial-gradient(circle at 70% 40%, rgba(255,77,166,0.18), transparent 50%),
              radial-gradient(circle at 50% 80%, rgba(255,0,180,0.12), transparent 55%);
  animation: move 10s ease-in-out infinite;
}

@keyframes move{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08);}
}

/* CENTER TEXT */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:2;
}

/* TITLE */
h1{
  font-size: clamp(40px,6vw,90px);
  margin:0;
  font-weight:800;
  color:#ff007a;
  letter-spacing:1px;
  text-shadow: 0 10px 30px rgba(255,0,122,0.25);
}

/* SUBTITLE */
h2{
  margin-top:10px;
  font-size: clamp(18px,2vw,28px);
  font-weight:500;
  color:#7c4dff;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:12px 26px;
  border:none;
  border-radius:999px;
  background: linear-gradient(135deg,#ff007a,#ff4da6);
  color:white;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(255,0,122,0.25);
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-3px);
}

/* FLOATING BLOBS */
.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(70px);
  opacity:0.6;
  animation: float 8s ease-in-out infinite;
}

.blob1{width:300px;height:300px;background:#ff4da6;top:10%;left:10%;}
.blob2{width:280px;height:280px;background:#ff007a;bottom:10%;right:10%;animation-delay:2s;}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-25px);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="hero">
  <h1>11th Physics Summit</h1>
  <h2>Departemen Fisika ITS</h2>
  <button class="btn">Explore Event</button>
</div>

</body>
</html>
