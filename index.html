<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated BG</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background: linear-gradient(135deg,#f7f9ff,#eef2ff,#fff0ff);
}

/* ANIMATED GRADIENT LAYER */
.bg{
  position:fixed;
  inset:0;
  background: linear-gradient(120deg,#ff4da6,#7c4dff,#00c2ff,#ffcc70);
  background-size:400% 400%;
  animation: gradientMove 12s ease infinite;
  opacity:0.25;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* FLOATING BLUR BUBBLES */
.blob{
  position:absolute;
  border-radius:50%;
  filter: blur(70px);
  opacity:0.5;
  animation: float 8s ease-in-out infinite;
}

.blob1{
  width:300px;
  height:300px;
  background:#ff4da6;
  top:10%;
  left:10%;
}

.blob2{
  width:340px;
  height:340px;
  background:#7c4dff;
  top:20%;
  right:10%;
  animation-delay:2s;
}

.blob3{
  width:260px;
  height:260px;
  background:#00c2ff;
  bottom:10%;
  left:30%;
  animation-delay:4s;
}

.blob4{
  width:220px;
  height:220px;
  background:#ffcc70;
  bottom:20%;
  right:25%;
  animation-delay:6s;
}

@keyframes float{
  0%,100%{transform:translateY(0) translateX(0) scale(1);}
  50%{transform:translateY(-30px) translateX(20px) scale(1.05);}
}

/* MOVING GRID */
.grid{
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
  background-size:70px 70px;
  opacity:0.08;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove{
  from{transform:translateY(0);}
  to{transform:translateY(-80px);}
}

/* LIGHT GLOW WAVE */
.wave{
  position:absolute;
  width:120%;
  height:120%;
  background: radial-gradient(circle at center, rgba(255,77,166,0.15), transparent 60%);
  animation: pulse 6s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1); opacity:0.4;}
  50%{transform:scale(1.2); opacity:0.7;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="wave"></div>
<div class="grid"></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="blob blob4"></div>

</body>
</html>
